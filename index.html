<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StartGo - Login & Setup</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        :root {
            --bg: #f0f2f5;
            --glass: rgba(255, 255, 255, 0.6);
            --text: #1e293b;
            --accent: #ff4757;
            --sub: #64748b;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, #e0e7ff 0%, #f1f5f9 100%);
            height: 100vh; margin: 0; display: flex; justify-content: center; align-items: center;
            color: var(--text);
        }

        .auth-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.7);
            padding: 40px; border-radius: 40px; width: 90%; max-width: 380px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05); text-align: center;
        }

        h2 { font-weight: 900; letter-spacing: -1.5px; font-size: 1.8rem; margin-bottom: 30px; }
        
        .input-group { margin-bottom: 15px; text-align: left; }
        label { font-size: 0.65rem; font-weight: 800; color: var(--sub); text-transform: uppercase; margin-left: 15px; }
        
        input {
            width: 100%; padding: 16px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.8);
            background: rgba(255,255,255,0.5); margin-top: 5px; outline: none; box-sizing: border-box;
            font-weight: 600; transition: 0.3s;
        }
        input:focus { border-color: var(--accent); background: white; }

        .role-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        
        .role-option {
            padding: 15px; border-radius: 20px; background: rgba(255,255,255,0.4);
            border: 2px solid transparent; cursor: pointer; font-weight: 800; font-size: 0.8rem;
            transition: 0.3s; color: var(--sub);
        }
        .role-option.active { border-color: var(--accent); color: var(--accent); background: white; }

        #mainBtn {
            width: 100%; padding: 20px; border-radius: 25px; border: none;
            background: var(--text); color: white; font-weight: 800; cursor: pointer;
            margin-top: 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); transition: 0.3s;
        }
        #mainBtn:hover { transform: translateY(-2px); }

        .toggle-link { font-size: 0.75rem; margin-top: 25px; cursor: pointer; color: var(--sub); font-weight: 600; }
    </style>
</head>
<body>

    <div class="auth-card">
        <h2>STARTGO<span style="color:var(--accent)">.</span></h2>
        
        <div id="signup-fields" style="display: none;">
            <div class="input-group">
                <label>Nom complet</label>
                <input type="text" id="fullname" placeholder="Ex: Marc Kevin">
            </div>
            <div class="role-selector">
                <div class="role-option active" id="opt-athlete" onclick="selectRole('athlete')">ATHLÈTE</div>
                <div class="role-option" id="opt-coach" onclick="selectRole('coach')">COACH</div>
            </div>
        </div>

        <div class="input-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="coach@startgo.com">
        </div>
        
        <div class="input-group">
            <label>Mot de passe</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <button id="mainBtn" onclick="handleAuth()">Se connecter</button>
        <div class="toggle-link" id="toggle-btn" onclick="toggleMode()">Nouveau ici ? Créer un compte</div>
    </div>

    <script>
        // CONFIGURATION AUTOMATIQUE (Tes clés)
        const firebaseConfig = {
            apiKey: "AIzaSyDKvUUqhl9xIBFVuBDT35rbjkFxBxWX5ZU",
            authDomain: "startgo-project.firebaseapp.com",
            projectId: "startgo-project",
            storageBucket: "startgo-project.firebasestorage.app",
            messagingSenderId: "920233789220",
            appId: "1:920233789220:web:9f8a8d9fd3a3add39a55b1"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let isSignup = false;
        let selectedRole = 'athlete';

        function toggleMode() {
            isSignup = !isSignup;
            document.getElementById('signup-fields').style.display = isSignup ? 'block' : 'none';
            document.getElementById('mainBtn').innerText = isSignup ? 'Créer le compte' : 'Se connecter';
            document.getElementById('toggle-btn').innerText = isSignup ? 'Déjà inscrit ? Connexion' : 'Nouveau ici ? Créer un compte';
        }

        function selectRole(role) {
            selectedRole = role;
            document.getElementById('opt-athlete').className = 'role-option' + (role === 'athlete' ? ' active' : '');
            document.getElementById('opt-coach').className = 'role-option' + (role === 'coach' ? ' active' : '');
        }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                if (isSignup) {
                    const name = document.getElementById('fullname').value;
                    const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                    
                    // Enregistrement du profil dans Firestore
                    await db.collection('users').doc(userCredential.user.uid).set({
                        name: name,
                        role: selectedRole,
                        email: email,
                        uid: userCredential.user.uid
                    });
                    alert("Compte " + selectedRole + " créé avec succès !");
                } else {
                    await auth.signInWithEmailAndPassword(email, password);
                    alert("Connexion réussie !");
                }
                
                // Ici, on pourra rediriger vers le Dashboard plus tard
            } catch (error) {
                alert("Erreur : " + error.message);
            }
        }
    </script>
</body>
</html>
