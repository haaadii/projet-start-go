<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StartGo Pro</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg: #f8fafc; --glass: rgba(255, 255, 255, 0.7); --text: #0f172a; --accent: #ff4757; --sub: #64748b; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #e2e8f0 0%, #f1f5f9 100%); margin: 0; min-height: 100vh; color: var(--text); display: flex; justify-content: center; align-items: center; }
        
        /* AUTH CARD */
        .auth-card { background: var(--glass); backdrop-filter: blur(20px); padding: 40px; border-radius: 40px; width: 90%; max-width: 380px; text-align: center; border: 1px solid rgba(255,255,255,0.8); box-shadow: 0 20px 50px rgba(0,0,0,0.05); }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { font-size: 0.65rem; font-weight: 800; color: var(--sub); text-transform: uppercase; margin-left: 15px; }
        input { width: 100%; padding: 16px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.8); background: rgba(255,255,255,0.5); margin-top: 5px; outline: none; box-sizing: border-box; font-weight: 600; }
        
        .role-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .role-option { padding: 15px; border-radius: 20px; background: rgba(255,255,255,0.4); border: 2px solid transparent; cursor: pointer; font-weight: 800; font-size: 0.8rem; color: var(--sub); transition: 0.3s; }
        .role-option.active { border-color: var(--accent); color: var(--accent); background: white; }

        /* DASHBOARD */
        #coach-dashboard { display: none; width: 100vw; height: 100vh; grid-template-columns: 280px 1fr; position: fixed; top: 0; left: 0; background: var(--bg); }
        .sidebar { background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(20px); border-right: 1px solid rgba(255,255,255,0.5); padding: 30px; display: flex; flex-direction: column; }
        .main-content { padding: 40px; overflow-y: auto; flex-grow: 1; }
        .glass-block { background: var(--glass); backdrop-filter: blur(20px); border-radius: 30px; padding: 25px; border: 1px solid rgba(255,255,255,0.8); margin-bottom: 20px; }
        
        button { padding: 15px 25px; border-radius: 20px; border: none; background: var(--text); color: white; font-weight: 800; cursor: pointer; transition: 0.3s; width: 100%; }
        .btn-accent { background: var(--accent); }
        .code-display { font-size: 3rem; font-weight: 900; color: var(--accent); margin: 20px 0; letter-spacing: 5px; }
    </style>
</head>
<body>

    <div id="auth-section" class="auth-card">
        <h2 style="font-weight:900;">STARTGO<span style="color:var(--accent)">.</span></h2>
        <div id="signup-fields" style="display: none;">
            <div class="input-group">
                <label>Nom complet</label>
                <input type="text" id="fullname" placeholder="Ex: Marc Kevin">
            </div>
            <div class="role-selector">
                <div class="role-option active" id="opt-athlete" onclick="selectRole('athlete')">ATHLÈTE</div>
                <div class="role-option" id="opt-coach" onclick="selectRole('coach')">COACH</div>
            </div>
        </div>
        <div class="input-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="coach@startgo.com">
        </div>
        <div class="input-group">
            <label>Mot de passe</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        <button id="mainBtn" onclick="handleAuth()">Se connecter</button>
        <div id="toggle-btn" onclick="toggleMode()" style="font-size: 0.75rem; margin-top: 25px; cursor: pointer; color: var(--sub); font-weight: 600;">Nouveau ici ? Créer un compte</div>
    </div>

    <div id="coach-dashboard">
        <aside class="sidebar">
            <h2 style="font-weight:900;">STARTGO<span style="color:var(--accent)">.</span></h2>
            <p style="font-size:0.7rem; font-weight:800; color:var(--sub); text-transform:uppercase;">Mes Athlètes</p>
            <div id="athletes-list"><p style="font-size:0.8rem; color:var(--sub);">Aucun athlète lié.</p></div>
            <button onclick="auth.signOut().then(() => location.reload())" style="margin-top:auto; background:#eee; color:#666;">Déconnexion</button>
        </aside>
        <main class="main-content">
            <div class="glass-block">
                <h1 id="welcome-coach">Bonjour, Coach</h1>
                <button class="btn-accent" onclick="generatePairingCode()">Générer un Code</button>
                <div id="pairing-area" style="display:none; text-align: center;">
                    <div class="code-display" id="display-code">----</div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDKvUUqhl9xIBFVuBDT35rbjkFxBxWX5ZU",
            authDomain: "startgo-project.firebaseapp.com",
            projectId: "startgo-project",
            storageBucket: "startgo-project.firebasestorage.app",
            messagingSenderId: "920233789220",
            appId: "1:920233789220:web:9f8a8d9fd3a3add39a55b1"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let isSignup = false;
        let selectedRole = 'athlete';

        function toggleMode() {
            isSignup = !isSignup;
            document.getElementById('signup-fields').style.display = isSignup ? 'block' : 'none';
            document.getElementById('mainBtn').innerText = isSignup ? 'Créer le compte' : 'Se connecter';
            document.getElementById('toggle-btn').innerText = isSignup ? 'Déjà inscrit ? Connexion' : 'Nouveau ici ? Créer un compte';
        }

        function selectRole(role) {
            selectedRole = role;
            document.getElementById('opt-athlete').className = 'role-option' + (role === 'athlete' ? ' active' : '');
            document.getElementById('opt-coach').className = 'role-option' + (role === 'coach' ? ' active' : '');
        }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                if (isSignup) {
                    const name = document.getElementById('fullname').value;
                    const res = await auth.createUserWithEmailAndPassword(email, password);
                    await db.collection('users').doc(res.user.uid).set({ name, role: selectedRole, email, uid: res.user.uid });
                } else {
                    await auth.signInWithEmailAndPassword(email, password);
                }
            } catch (e) { alert(e.message); }
        }

        // --- ECOUTEUR DE CONNEXION (Gère l'affichage automatique) ---
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const doc = await db.collection('users').doc(user.uid).get();
                if (doc.exists) {
                    const userData = doc.data();
                    if (userData.role === 'coach') {
                        document.getElementById('auth-section').style.display = 'none';
                        document.getElementById('coach-dashboard').style.display = 'grid';
                        document.getElementById('welcome-coach').innerText = "Bonjour, " + userData.name;
                    } else {
                        alert("Interface Athlète en développement !");
                    }
                }
            }
        });

        async function generatePairingCode() {
            const code = Math.random().toString(36).substring(2, 6).toUpperCase();
            await db.collection('pairing_codes').doc(code).set({
                coachId: auth.currentUser.uid,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.getElementById('pairing-area').style.display = 'block';
            document.getElementById('display-code').innerText = code;
        }
    </script>
</body>
</html>
